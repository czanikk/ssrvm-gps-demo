<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSRVM GPS — Admin Dashboard</title>
  <link rel="stylesheet" href="../parent-app/css/app.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    .admin-shell { display: flex; height: 100vh; background: #0d0d1a; overflow: hidden; }

    .admin-sidebar {
      width: 300px;
      background: #111827;
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .admin-logo { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .admin-logo h2 { color: #fff; font-size: 16px; font-weight: 700; margin: 0 0 4px; }
    .admin-logo p  { color: rgba(255,255,255,0.35); font-size: 12px; margin: 0; }

    .admin-logo-actions { display: flex; align-items: center; justify-content: space-between; }
    .logout-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      color: rgba(255,255,255,.4);
      font-size: 11px;
      padding: 5px 10px;
      cursor: pointer;
    }
    .logout-btn:hover { color: #fff; background: rgba(255,255,255,.1); }

    .admin-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .stat-box { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px; text-align: center; }
    .stat-box .snum { font-size: 24px; font-weight: 800; color: #fff; }
    .stat-box .slbl { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .stat-box.active-stat .snum  { color: #00d4aa; }
    .stat-box.stopped-stat .snum { color: #f7931e; }

    .bus-list-header {
      padding: 12px 16px 8px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .bus-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
    .bus-list::-webkit-scrollbar { width: 4px; }
    .bus-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .bus-list-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .bus-list-item:hover    { background: rgba(255,255,255,0.05); }
    .bus-list-item.selected { background: rgba(255,107,53,0.1); }

    .bus-list-num {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }

    .bus-list-info { flex: 1; min-width: 0; }
    .bus-list-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bus-list-sub  { font-size: 11px; color: rgba(255,255,255,0.35); }

    .bus-list-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .bus-list-dot.active   { background: #00d4aa; }
    .bus-list-dot.stopped  { background: #f7931e; }
    .bus-list-dot.inactive { background: #444; }

    .admin-main { flex: 1; position: relative; overflow: hidden; }
    #admin-map  { width: 100%; height: 100%; }

    .admin-topbar {
      position: absolute;
      top: 16px; left: 16px; right: 16px;
      z-index: 1000;
      display: flex;
      gap: 10px;
      pointer-events: none;
    }

    .admin-topbar > * { pointer-events: all; }

    .map-title-chip {
      background: rgba(17,24,39,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    .detail-panel {
      position: absolute;
      bottom: 24px; right: 16px;
      width: 260px;
      background: rgba(17,24,39,0.97);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      z-index: 1000;
      backdrop-filter: blur(20px);
      display: none;
    }

    .detail-panel.visible { display: block; }
    .detail-panel h3 { color: #fff; font-size: 16px; font-weight: 700; margin: 0 0 14px; }

    .detail-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .detail-row .dl { color: rgba(255,255,255,0.4); font-size: 12px; }
    .detail-row .dv { color: #fff; font-size: 13px; font-weight: 600; }

    .close-panel {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none;
      color: rgba(255,255,255,0.4); font-size: 18px;
      cursor: pointer; line-height: 1;
    }

    .admin-bus-marker {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      font-size: 22px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      position: relative;
    }

    .admin-bus-marker .bus-num-label {
      position: absolute; bottom: -6px;
      background: #ff6b35; color: #fff;
      font-size: 10px; font-weight: 800;
      padding: 1px 5px; border-radius: 4px;
    }

    @media (max-width: 768px) { .admin-sidebar { width: 220px; } }
  </style>
</head>
<body>

  <div class="admin-shell">

    <aside class="admin-sidebar">
      <div class="admin-logo">
        <div class="admin-logo-actions">
          <h2>🚌 SSRVM GPS Admin</h2>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
        <p>Live Fleet Dashboard — Demo</p>
      </div>

      <div class="admin-stats">
        <div class="stat-box active-stat">
          <div class="snum" id="stat-active">—</div>
          <div class="slbl">Moving</div>
        </div>
        <div class="stat-box stopped-stat">
          <div class="snum" id="stat-stopped">—</div>
          <div class="slbl">Stopped</div>
        </div>
        <div class="stat-box">
          <div class="snum" id="stat-total">27</div>
          <div class="slbl">Total Buses</div>
        </div>
        <div class="stat-box">
          <div class="snum" id="stat-students">~5000</div>
          <div class="slbl">Students</div>
        </div>
      </div>

      <div class="bus-list-header">All Buses</div>
      <div class="bus-list" id="bus-list"></div>
    </aside>

    <main class="admin-main">
      <div id="admin-map"></div>

      <div class="admin-topbar">
        <div class="map-title-chip">🗺️ Live Fleet Map — All 27 Buses</div>
        <div class="map-title-chip" id="update-time">Last update: —</div>
      </div>

      <div class="detail-panel" id="detail-panel">
        <button class="close-panel" onclick="closeDetail()">✕</button>
        <h3 id="dp-title">Bus —</h3>
        <div class="detail-row"><span class="dl">Route</span>   <span class="dv" id="dp-route">—</span></div>
        <div class="detail-row"><span class="dl">Driver</span>  <span class="dv" id="dp-driver">—</span></div>
        <div class="detail-row"><span class="dl">Phone</span>   <span class="dv" id="dp-phone">—</span></div>
        <div class="detail-row"><span class="dl">Speed</span>   <span class="dv" id="dp-speed">—</span></div>
        <div class="detail-row"><span class="dl">Status</span>  <span class="dv" id="dp-status">—</span></div>
        <div class="detail-row"><span class="dl">Updated</span> <span class="dv" id="dp-updated">—</span></div>
      </div>
    </main>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let adminMap;
    let busMarkers = {};
    let selectedBusId = null;

    window.addEventListener('DOMContentLoaded', () => {
      initAdminMap();
      connectAdminSSE();
    });

    function initAdminMap() {
      adminMap = L.map('admin-map', {
        center: [26.1445, 91.7362],
        zoom: 13,
        zoomControl: true
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19
      }).addTo(adminMap);

      L.marker([26.1445, 91.7362], {
        icon: L.divIcon({
          className: '',
          html: '<div style="font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))">🏫</div>',
          iconSize: [36, 36],
          iconAnchor: [18, 36]
        })
      }).addTo(adminMap).bindPopup('<b>SSRVM School</b><br>Sri Sri Ravishankar Vidya Mandir');
    }

    function connectAdminSSE() {
      const es = new EventSource('/api/track-all');
      es.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'ALL_BUSES') updateAllBuses(msg.data);
        } catch (_) {}
      };
      es.onerror = () => setTimeout(connectAdminSSE, 3000);
    }

    function updateAllBuses(buses) {
      let active = 0, stopped = 0;
      buses.forEach(bus => {
        if (bus.status === 'active')  active++;
        if (bus.status === 'stopped') stopped++;
        updateBusMarker(bus);
      });

      document.getElementById('stat-active').textContent  = active;
      document.getElementById('stat-stopped').textContent = stopped;
      document.getElementById('update-time').textContent  = `Updated: ${new Date().toLocaleTimeString('en-IN')}`;
      updateBusList(buses);
    }

    function updateBusMarker(bus) {
      if (!bus.lat || !bus.lng) return;

      const icon = L.divIcon({
        className: '',
        html: `<div class="admin-bus-marker"><span>${bus.status === 'active' ? '🚌' : '🚍'}</span><span class="bus-num-label">${bus.busNumber}</span></div>`,
        iconSize: [40, 46],
        iconAnchor: [20, 23]
      });

      if (busMarkers[bus.id]) {
        busMarkers[bus.id].setLatLng([bus.lat, bus.lng]);
        busMarkers[bus.id].setIcon(icon);
      } else {
        busMarkers[bus.id] = L.marker([bus.lat, bus.lng], { icon })
          .addTo(adminMap)
          .on('click', () => selectBus(bus));
      }

      if (selectedBusId === bus.id) populateDetailPanel(bus);
    }

    function updateBusList(buses) {
      const list = document.getElementById('bus-list');
      if (list.children.length === buses.length) {
        buses.forEach(bus => {
          const dot = document.getElementById(`dot-${bus.id}`);
          const sub = document.getElementById(`sub-${bus.id}`);
          if (dot) dot.className = `bus-list-dot ${bus.status}`;
          if (sub) sub.textContent = `${Math.round(bus.speed)} km/h • ${bus.status}`;
        });
        return;
      }

      list.innerHTML = buses.map(bus => `
        <div class="bus-list-item ${selectedBusId === bus.id ? 'selected' : ''}"
             id="li-${bus.id}"
             onclick="selectBusFromList('${bus.id}')">
          <div class="bus-list-num">${bus.busNumber}</div>
          <div class="bus-list-info">
            <div class="bus-list-name">Bus ${bus.busNumber} — ${bus.routeName.replace(' Route','')}</div>
            <div class="bus-list-sub" id="sub-${bus.id}">${Math.round(bus.speed)} km/h • ${bus.status}</div>
          </div>
          <div class="bus-list-dot ${bus.status}" id="dot-${bus.id}"></div>
        </div>
      `).join('');
    }

    function selectBus(bus) {
      selectedBusId = bus.id;
      populateDetailPanel(bus);
      document.querySelectorAll('.bus-list-item').forEach(el => el.classList.remove('selected'));
      const li = document.getElementById(`li-${bus.id}`);
      if (li) { li.classList.add('selected'); li.scrollIntoView({ block: 'nearest' }); }
    }

    function selectBusFromList(busId) {
      selectedBusId = busId;
      const marker = busMarkers[busId];
      if (marker) { adminMap.panTo(marker.getLatLng(), { animate: true }); }
      document.querySelectorAll('.bus-list-item').forEach(el => el.classList.remove('selected'));
      const li = document.getElementById(`li-${busId}`);
      if (li) li.classList.add('selected');
      document.getElementById('detail-panel').classList.add('visible');
    }

    function populateDetailPanel(bus) {
      document.getElementById('detail-panel').classList.add('visible');
      document.getElementById('dp-title').textContent   = `Bus ${bus.busNumber} — ${bus.routeName}`;
      document.getElementById('dp-route').textContent   = bus.routeName;
      document.getElementById('dp-driver').textContent  = bus.driverName;
      document.getElementById('dp-phone').textContent   = bus.driverPhone;
      document.getElementById('dp-speed').textContent   = `${Math.round(bus.speed)} km/h`;
      document.getElementById('dp-status').textContent  = bus.status === 'active' ? '🟢 Moving' : '🟡 Stopped';
      document.getElementById('dp-updated').textContent = bus.lastUpdate ? new Date(bus.lastUpdate).toLocaleTimeString('en-IN') : '—';
    }

    function closeDetail() {
      selectedBusId = null;
      document.getElementById('detail-panel').classList.remove('visible');
      document.querySelectorAll('.bus-list-item').forEach(el => el.classList.remove('selected'));
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/parent/login.html';
    }
  </script>
</body>
</html>
